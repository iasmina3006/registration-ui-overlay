<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Registrierung</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="stage" aria-label="Demo einer Registrierungsseite">
    <img
      class="background-page"
      src="registration-bg.png"
      alt="Registrierungsseite als visuelles Mockup"
    >

    <section class="password-overlay" aria-label="Passwortbereich">
      <div class="form-row">
        <label for="password">Passwort *</label>

        <div class="password-field">
          <input
            id="password"
            class="password-input is-masked"
            type="text"
            maxlength="16"
            autocomplete="new-password"
            aria-describedby="password-counter password-summary password-rules"
          >

          <button
            class="password-toggle"
            type="button"
            data-target="password"
            aria-label="Passwort anzeigen"
          ></button>
        </div>
      </div>

      <div class="password-strength" aria-hidden="true">
        <div id="strength-bar" class="password-strength-bar"></div>
      </div>

      <p id="strength-text" class="hint">Stärke: –</p>

      <div class="form-row">
        <label for="password-repeat">Passwort wiederholen *</label>

        <div class="password-field">
          <input
            id="password-repeat"
            class="password-input is-masked"
            type="text"
            maxlength="16"
            autocomplete="new-password"
            aria-describedby="repeat-feedback"
          >

          <button
            class="password-toggle"
            type="button"
            data-target="password-repeat"
            aria-label="Passwort anzeigen"
          ></button>
        </div>
      </div>

      <p id="password-counter" class="hint">0 / 16 Zeichen</p>
      <p id="password-summary" class="hint">Erfüllt: 0 von 5 Kriterien</p>

      <ul id="password-rules" class="password-rules">
        <li data-rule="length">Länge 8–16 Zeichen</li>
        <li data-rule="lower">Kleinbuchstaben</li>
        <li data-rule="upper">Großbuchstaben</li>
        <li data-rule="digit">Ziffern</li>
        <li data-rule="special">Sonderzeichen (z. B. ! @ # $ %)</li>
      </ul>

      <p id="repeat-feedback" class="repeat-feedback" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
